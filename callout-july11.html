<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTLO July 11 Tournament</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Barlow Condensed', sans-serif;
  }

  .card {
    width: 540px;
    height: 540px;
    background: #1F4049;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Corner accent lines */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 120px; height: 120px;
    border-top: 4px solid #F8BA44;
    border-left: 4px solid #F8BA44;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 120px; height: 120px;
    border-bottom: 4px solid #F8BA44;
    border-right: 4px solid #F8BA44;
  }

  /* Subtle grid texture */
  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 36px 36px;
  }

  /* Orange accent bar */
  .accent-bar {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 2px;
    background: #F8BA44;
    opacity: 0.15;
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 0 40px;
  }

  .org-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 4px;
    color: #F8BA44;
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0.9;
  }

  .date-block {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
    margin-bottom: 4px;
  }

  .date-month {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 2.4rem;
    color: #F8BA44;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .date-day {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 7rem;
    color: #FFF9F5;
    line-height: 1;
    letter-spacing: -2px;
  }

  .event-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    color: #FFF9F5;
    text-transform: uppercase;
    letter-spacing: 6px;
    margin-bottom: 28px;
    opacity: 0.95;
  }

  .divider {
    width: 48px;
    height: 3px;
    background: #F8BA44;
    margin: 0 auto 28px;
    border-radius: 2px;
  }

  .cta-block {
    background: #F8BA44;
    padding: 14px 36px;
    display: inline-block;
  }

  .cta-line1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: #1F4049;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .cta-line2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.5rem;
    color: #1F4049;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .bottom-tag {
    position: absolute;
    bottom: 22px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.72rem;
    letter-spacing: 3px;
    color: rgba(255,249,245,0.35);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="card">
  <div class="grid-overlay"></div>
  <div class="accent-bar"></div>

  <div class="content">
    <div class="org-tag">FTLO Volleyball</div>

    <div class="date-block">
      <span class="date-month">July</span>
      <span class="date-day">11</span>
    </div>

    <div class="event-label">Tournament</div>

    <div class="divider"></div>

    <div class="cta-block">
      <div class="cta-line1">Want to play?</div>
      <div class="cta-line2">Ask us for the link</div>
    </div>
  </div>

  <div class="bottom-tag">ftlovolleyball.ca</div>
</div>
</body>
</html>
